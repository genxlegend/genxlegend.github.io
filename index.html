<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockCraft MC - Minecraft Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d0f14;
            --bg-secondary: #14181f;
            --bg-card: #1a202a;
            --bg-card-hover: #232b38;
            --text-primary: #f0f4f8;
            --text-secondary: #a0b4c8;
            --accent-green: #5fcb6b;
            --accent-gold: #f5b342;
            --accent-blue: #4a9eff;
            --accent-purple: #a78bfa;
            --accent-red: #ef4444;
            --border-glow: rgba(95, 203, 107, 0.25);
            --shadow-glow: 0 0 40px rgba(95, 203, 107, 0.08);
            --radius: 16px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-green);
            border-radius: 4px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            display: block;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== UTILITY ===== */
        .section-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-green);
            background: rgba(95, 203, 107, 0.12);
            padding: 4px 14px;
            border-radius: 100px;
            margin-bottom: 12px;
            border: 1px solid rgba(95, 203, 107, 0.15);
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 12px;
        }
        .section-title span {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-desc {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 600px;
        }

        .text-center {
            text-align: center;
        }
        .mx-auto {
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #3a9e47);
            color: #0d0f14;
            box-shadow: 0 4px 20px rgba(95, 203, 107, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(95, 203, 107, 0.45);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--accent-gold), #d4912a);
            color: #0d0f14;
            box-shadow: 0 4px 20px rgba(245, 179, 66, 0.3);
        }
        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(245, 179, 66, 0.45);
        }

        /* ===== GLOW ORB BG ===== */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        .glow-orb--1 {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -200px;
            background: var(--accent-green);
        }
        .glow-orb--2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            background: var(--accent-purple);
        }

        /* ===== HEADER / NAV ===== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 16px 0;
            transition: var(--transition);
            background: transparent;
        }
        header.scrolled {
            background: rgba(13, 15, 20, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 10px 0;
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }
        .logo i {
            color: var(--accent-green);
            font-size: 1.6rem;
        }
        .logo span {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }
        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-green);
            transition: var(--transition);
        }
        .nav-links a:hover {
            color: var(--text-primary);
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            padding: 10px 24px;
            font-size: 0.85rem;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: var(--text-primary);
            border-radius: 4px;
            transition: var(--transition);
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ===== HERO ===== */
        #hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding-top: 80px;
            overflow: hidden;
        }
        #hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(95, 203, 107, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(167, 139, 250, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .hero-content .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(95, 203, 107, 0.1);
            border: 1px solid rgba(95, 203, 107, 0.15);
            padding: 6px 16px 6px 10px;
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--accent-green);
            margin-bottom: 24px;
        }
        .hero-content .badge .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .hero-content h1 {
            font-size: clamp(2.6rem, 6vw, 4.2rem);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 20px;
        }
        .hero-content h1 .highlight {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin-bottom: 32px;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 28px;
        }

        .server-ip {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 20px 10px 24px;
            border-radius: 100px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .server-ip:hover {
            border-color: var(--accent-green);
            color: var(--text-primary);
        }
        .server-ip i {
            color: var(--accent-green);
        }
        .server-ip .copy-feedback {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: var(--accent-green);
            opacity: 0;
            transition: var(--transition);
        }
        .server-ip .copy-feedback.show {
            opacity: 1;
        }

        .hero-stats {
            display: flex;
            gap: 40px;
        }
        .hero-stats .stat {
            display: flex;
            flex-direction: column;
        }
        .hero-stats .stat .number {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
        }
        .hero-stats .stat .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Hero visual */
        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .hero-visual .cube-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            perspective: 800px;
        }
        .hero-visual .cube {
            aspect-ratio: 1;
            border-radius: 10px;
            background: rgba(95, 203, 107, 0.08);
            border: 1px solid rgba(95, 203, 107, 0.06);
            transition: var(--transition);
            animation: float-cube 6s infinite ease-in-out alternate;
        }
        .hero-visual .cube:nth-child(1) {
            background: rgba(95, 203, 107, 0.25);
            border-color: rgba(95, 203, 107, 0.2);
        }
        .hero-visual .cube:nth-child(2) {
            background: rgba(245, 179, 66, 0.2);
            border-color: rgba(245, 179, 66, 0.15);
        }
        .hero-visual .cube:nth-child(3) {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.15);
        }
        .hero-visual .cube:nth-child(4) {
            background: rgba(74, 158, 255, 0.2);
            border-color: rgba(74, 158, 255, 0.15);
        }
        .hero-visual .cube:nth-child(5) {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.1);
        }
        .hero-visual .cube:nth-child(6) {
            background: rgba(95, 203, 107, 0.15);
            border-color: rgba(95, 203, 107, 0.1);
        }
        .hero-visual .cube:nth-child(7) {
            background: rgba(245, 179, 66, 0.15);
            border-color: rgba(245, 179, 66, 0.1);
        }
        .hero-visual .cube:nth-child(8) {
            background: rgba(167, 139, 250, 0.15);
            border-color: rgba(167, 139, 250, 0.1);
        }
        .hero-visual .cube:nth-child(9) {
            background: rgba(74, 158, 255, 0.15);
            border-color: rgba(74, 158, 255, 0.1);
        }
        .hero-visual .cube:nth-child(10) {
            background: rgba(95, 203, 107, 0.2);
            border-color: rgba(95, 203, 107, 0.15);
        }

        @keyframes float-cube {
            0% {
                transform: translateY(0) rotateX(0) rotateY(0);
            }
            100% {
                transform: translateY(-8px) rotateX(4deg) rotateY(6deg);
            }
        }

        /* ===== SERVER STATUS BAR ===== */
        #status-bar {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(20, 24, 31, 0.6);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 72px;
            z-index: 100;
        }
        .status-inner {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .status-indicator .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: var(--transition);
        }
        .status-indicator .dot.online {
            background: var(--accent-green);
            box-shadow: 0 0 20px rgba(95, 203, 107, 0.5);
            animation: pulse-dot 1.5s infinite;
        }
        .status-indicator .dot.offline {
            background: var(--accent-red);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .status-players {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .status-players strong {
            color: var(--text-primary);
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .status-right i {
            color: var(--accent-gold);
        }

        /* ===== FEATURES ===== */
        #features {
            padding: 80px 0;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 28px;
            margin-top: 48px;
        }
        .feature-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius);
            padding: 32px 28px;
            transition: var(--transition);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-gold));
            opacity: 0;
            transition: var(--transition);
        }
        .feature-card:hover {
            transform: translateY(-6px);
            border-color: rgba(95, 203, 107, 0.15);
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-glow);
        }
        .feature-card:hover::before {
            opacity: 1;
        }
        .feature-card .icon {
            font-size: 2.2rem;
            margin-bottom: 16px;
            display: inline-block;
        }
        .feature-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .feature-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* ===== GAME MODES ===== */
        #gamemodes {
            padding: 80px 0;
            background: var(--bg-secondary);
        }
        .modes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
            margin-top: 48px;
        }
        .mode-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: var(--transition);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .mode-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(95, 203, 107, 0.2);
            box-shadow: var(--shadow-glow);
        }
        .mode-card .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 16px;
        }
        .mode-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .mode-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 8px 0 16px;
        }
        .mode-card .players {
            font-size: 0.8rem;
            color: var(--accent-green);
            font-weight: 600;
        }

        /* ===== GALLERY ===== */
        #gallery {
            padding: 80px 0;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 48px;
        }
        .gallery-item {
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16/10;
