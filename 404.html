<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Wrong Directory | Gen_X_Legend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="404.css" />


</head>
<body class="page-404">

  <!-- Ambient blobs -->
  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>

  <!-- ═══════ NAVBAR ═══════ -->

  <!-- ═══════ MAIN ═══════ -->
  <main class="main-404">

    <!-- 404 heading -->
    <div class="header-404">
      <div class="err-tag">
        <span class="blink-dot"></span>
        // error.throw(404)
      </div>
      <div class="err-num" data-text="404">404</div>
      <h1 class="err-headline">Wrong Directory!</h1>
      <p class="err-sub">Attempting automated recovery... please stand by</p>
    </div>

    <!-- Console -->
    <div class="console-wrap">
      <div class="fail-flash" id="failFlash"></div>

      <div class="term-window">
        <div class="term-bar">
          <span class="tdot tdot-r"></span>
          <span class="tdot tdot-y"></span>
          <span class="tdot tdot-g"></span>
          <span class="term-bar-title">gen_x_legend@recovery-bot: ~/404</span>
          <span class="term-status" id="termStatus">idle</span>
        </div>
        <div class="term-body" id="termBody"></div>
      </div>

      <!-- Emoji burst stage (overlays terminal) -->
      <div class="emoji-stage" id="emojiStage"></div>

      <!-- Round pills -->
      <div class="round-track" id="roundTrack"></div>
    </div>

    <!-- Nav links -->
    <div class="back-links">
      <a href="index.html" class="back-links-a link-home">
        <i class="fas fa-home"></i> Back to Home
      </a>
      <a href="index.html#skills" class="back-links-a link-outline">
        <i class="fas fa-code"></i> View Skills
      </a>
      <a href="index.html#contact" class="back-links-a link-outline">
        <i class="fas fa-envelope"></i> Contact
      </a>
    </div>

  </main>

  <!-- ═══════ FOOTER ═══════ -->
  <footer class="footer-404">
    © 2025 <strong>Gen_X_Legend</strong> &nbsp;·&nbsp; You weren't supposed to end up here 😬
  </footer>


</body>
</html>
